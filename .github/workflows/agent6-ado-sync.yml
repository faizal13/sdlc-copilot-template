name: "Agent 6 — ADO Sync (Post-Prod)"

# Triggers on push to main — which only happens after prod deployment
# via "03 - Release" workflow (release.yml)
#
# Your devops flow:
#   feature → release/* → SIT → UAT → Pre-Prod → Prod → main
#
# ADO story is marked Done only when code reaches production.
# This is intentional — Done means deployed to prod, not just merged to a release branch.
#
# ADO ID is extracted from the commit message on main.
# The commit message comes from the release merge and should contain ADO-xxx.
# If it does not, the workflow skips gracefully — no error.

on:
  push:
    branches: [main]
    paths-ignore:
      - '.copilot/**'   # skip learning agent commits

jobs:
  ado-sync:
    if: "!contains(github.event.head_commit.message, '[skip-learning]')"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Extract ADO story IDs from commit message
        id: extract
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_URL="${{ github.event.head_commit.url }}"

          # Extract all ADO IDs mentioned in the commit — there may be multiple
          ADO_IDS=$(echo "$COMMIT_MSG" | grep -oP 'ADO-\d+' | grep -oP '\d+' | sort -u | tr '\n' ' ')

          echo "ado_ids=${ADO_IDS}" >> $GITHUB_OUTPUT
          echo "commit_url=${COMMIT_URL}" >> $GITHUB_OUTPUT

          if [ -z "$ADO_IDS" ]; then
            echo "No ADO story IDs found in commit message — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Found ADO IDs: ${ADO_IDS}"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Update ADO stories to Done
        if: steps.extract.outputs.skip == 'false'
        env:
          ADO_ORG_URL: ${{ secrets.ADO_ORGANIZATION_URL }}
          ADO_PAT: ${{ secrets.ADO_PERSONAL_ACCESS_TOKEN }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
          ADO_IDS: ${{ steps.extract.outputs.ado_ids }}
          COMMIT_URL: ${{ steps.extract.outputs.commit_url }}
        run: |
          for ADO_ID in $ADO_IDS; do
            echo "Updating ADO story ${ADO_ID} → Done..."

            HTTP_STATUS=$(curl -s -o /tmp/ado_response.json -w "%{http_code}" \
              -X PATCH \
              -u ":${ADO_PAT}" \
              -H "Content-Type: application/json-patch+json" \
              "${ADO_ORG_URL}/${ADO_PROJECT}/_apis/wit/workitems/${ADO_ID}?api-version=7.1" \
              -d "[
                {
                  \"op\": \"add\",
                  \"path\": \"/fields/System.State\",
                  \"value\": \"Done\"
                },
                {
                  \"op\": \"add\",
                  \"path\": \"/fields/System.History\",
                  \"value\": \"Automatically closed by Agent 6 (ADO Sync). Code deployed to production. Commit: ${COMMIT_URL}\"
                }
              ]")

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ ADO-${ADO_ID} → Done"
            else
              echo "⚠️ ADO-${ADO_ID} update returned HTTP ${HTTP_STATUS}"
              cat /tmp/ado_response.json
            fi
          done
